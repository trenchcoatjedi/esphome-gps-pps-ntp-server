esphome:
  friendly_name: "ESP32-S3-ETH NTP"
  name: ntp-server

psram:
  mode: octal
  speed: 80MHz

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

logger:
  baud_rate: 0
  level: DEBUG

api:
  reboot_timeout: 0s

preferences:
  flash_write_interval: never

ota:
  - platform: esphome

web_server:
  port: 80
  version: 3
  local: true

ethernet:
  type: W5500
  clk_pin: GPIO13
  mosi_pin: GPIO11
  miso_pin: GPIO12
  cs_pin: GPIO14
  interrupt_pin: GPIO10
  reset_pin: GPIO9

sensor:
  - platform: uptime
    name: "Uptime"
    update_interval: 60s
    icon: mdi:clock-outline
    entity_category: "diagnostic"
  - platform: internal_temperature
    name: "Internal Temperature"
    entity_category: "diagnostic"

switch:
  - platform: restart
    name: "Restart Device"
    entity_category: "diagnostic"
